<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aetheria Design VR</title>
    <link rel="stylesheet" href="CSS/style.css">

</head>

<body>

    <!-- ===== PESSOA 2 (TOPO: HEADER + MENU + LOGO) ===== -->
    <header>
        <!-- logo -->
        <div class="logo">
            <img src="IMGS/logo.png" alt="Logo Aetheria" >
        

            <h1>Aetheria <span>Design VR</span></h1>
        </div>
        <!-- menu -->
        <nav>
            <a href="#quem-somos">Quem somos</a>
            <a href="#servicos">Serviços</a>
            <a href="#time">Time</a>
            <a href="#faq">FAQ</a>
            <a href="#contato">Contato</a>

            <!-- PERFIL -->
            <img src="IMGS/perfil.png" alt="Perfil" class="perfil">

        </nav>
    </header>
    <!-- ===== FIM PESSOA 2 ===== -->


    <!-- ===== PESSOA 1 (VOCÊ - BASE DO SITE) ===== -->
    <main>
    <!-- ===== FIM PESSOA 1 ===== -->


        <!-- ===== PESSOA 3 (QUEM SOMOS + SERVIÇOS) ===== -->
        <section id="quem-somos">
            <h2>Quem somos</h2>
            <p><!-- texto aqui --></p>
        </section>

        <section id="servicos">
            <h2>Serviços</h2>
            <!-- cards ou conteúdo -->
        </section>
        <!-- ===== FIM PESSOA 3 ===== -->


        <!-- ===== PESSOA 4 (TIME + FAQ + CONTATO) ===== -->
       
        <section id="faq">
            <h2>FAQ</h2>
            <!-- perguntas e respostas -->
        </section>

         <section id="time">
            <h2>Nosso time</h2>
            <!-- imagens + nomes -->
        </section>

        <section id="contato">
            <h2>Contato</h2>
            <!-- email, telefone, botão -->
        </section>
        <!-- ===== FIM PESSOA 4 ===== -->


    <!-- ===== PESSOA 1 (FECHAMENTO MAIN) ===== -->
    </main>
    <!-- ===== FIM PESSOA 1 MAIN ===== -->


    <!-- ===== PESSOA 5 (RODAPÉ + REDES SOCIAIS + REVISÃO) ===== -->
    <footer>
        <p>© 2026 Aetheria</p>

        <!-- redes sociais -->
        <a href="https://whatsapp.com" target="_blank">WhatsApp</a>
        <a href="https://twitter.com" target="_blank">Twitter</a>
        <a href="https://facebook.com" target="_blank">Facebook</a>
        <a href="https://instagram.com" target="_blank">Instagram</a>
    </footer>
    <!-- ===== FIM PESSOA 5 ===== -->

    <!-- BOTÃO IA FLUTUANTE (EXTRA) -->
        <button class="btn-ia">IA</button>

</html>
